name: Aura Music Android Production Build

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android Release Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant Gradle Execute Permission
        working-directory: android_app_repository
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: android_app_repository
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Release App Bundle
        working-directory: android_app_repository
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Aura-Release-APK
          path: android_app_repository/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: Aura-Release-AAB
          path: android_app_repository/app/build/outputs/bundle/release/*.aab
          retention-days: 30
