name: Authentic Android APK & AAB Production Cloud Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*' # Automatically instantiate compile triggers exactly when pushing production release tags (e.g. v2.0.0)
  workflow_dispatch: # Enable manual 1-click trigger directly from GitHub website

jobs:
  build-and-sign-android-release:
    name: Compile & Cryptographically Sign Production APK & App Bundle
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Check out active application repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup Professional OpenJDK 17 Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: 🛡️ Make Linux Operating System Gradle Wrapper Executable
        run: chmod +x ./gradlew
        working-directory: android_app_repository

      - name: ⚙️ Execute Fully Offline Assembly & Bundling passes
        run: |
          ./gradlew assembleRelease --no-daemon
          ./gradlew bundleRelease --no-daemon
        working-directory: android_app_repository

      - name: 🔑 Professional Automated Cryptographic Signing
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android_app_repository/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.AURA_ENCODED_KEYSTORE_BASE64 }}
          alias: ${{ secrets.AURA_KEYSTORE_ALIAS }}
          keyStorePassword: ${{ secrets.AURA_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.AURA_KEY_PASSWORD }}

      - name: 📦 Upload Cryptographically Signed Production APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuraMusic-ProductionEdition-Signed-APK
          path: ${{steps.sign_app.outputs.signedReleaseFile}}
          retention-days: 90

      - name: 🚀 Automatically Publish High-Fidelity GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Aura Music High-Fidelity Edition ${{ github.ref_name }}
          body: |
            ## 📱 Aura Music: Native Android Production Edition
            Uncompromising 100% Offline Hi-Res Audiophile Player with Google Sans variable typography and True Peak limiters.
            
            ### 🛡️ Core Transducer Metrology & Fixes:
            * **AAudio / Media3 Exclusive Hook:** Flawless gapless decoding entirely detached from OS upsamplers.
            * **Material 3 / Liquid Glass UI:** Impeccable two-stage console separation margin and moving artwork blurs.
            * **Automated Binary Sanitation:** xxHash64 real-time duplicate remediation scanners active.
            
            *Cryptographically signed using secure 2048-bit RSA enterprise certificates.*
          files: |
            ${{steps.sign_app.outputs.signedReleaseFile}}
            android_app_repository/app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
